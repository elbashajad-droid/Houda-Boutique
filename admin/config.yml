backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "clothes"
    label: "Houda Boutique Products"
    folder: "data"
    create: true
    format: "json"
    fields:
      - { label: "Clothing Item Name", name: "name", widget: "string" }
      - { label: "Price ($)", name: "price", widget: "number", value_type: "int" }
      - { label: "Product Image", name: "image", widget: "image" }
      - { label: "Description", name: "body", widget: "markdown" }
