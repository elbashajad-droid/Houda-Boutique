<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Houda Boutique</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #ffffff; color: #3d342e; }
        header { background-color: #f5ebe0; padding: 25px 20px; text-align: center; border-bottom: 1px solid #e3d5ca; position: sticky; top: 0; z-index: 100; }
        h1 { margin: 0 0 15px 0; font-family: Georgia, serif; letter-spacing: 3px; color: #4a3b32; text-transform: uppercase; }
        nav button { background: none; border: none; padding: 10px 20px; margin: 0 5px; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; color: #706259; border-bottom: 2px solid transparent; }
        nav button.active { color: #4a3b32; font-weight: bold; border-bottom: 2px solid #4a3b32; }
        .page { display: none; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .page.active { display: block; }
        /* Search Bar Styles */
        #searchBar { width: 100%; max-width: 400px; padding: 12px; margin: 0 auto 30px; display: block; border: 1px solid #e3d5ca; border-radius: 4px; font-size: 16px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 35px; }
        .product-card { background: #ffffff; border-radius: 4px; padding: 15px; text-align: center; border: 1px solid #f5ebe0; transition: transform 0.3s ease; display: flex; flex-direction: column; justify-content: space-between; }
        .product-card:hover { transform: translateY(-4px); }
        .product-img { width: 100%; height: 320px; object-fit: cover; border-radius: 2px; margin-bottom: 15px; background-color: #fdfbf7; border: 1px solid #f5ebe0; }
        .product-card h3 { margin: 12px 0 6px 0; color: #4a3b32; font-family: Georgia, serif; font-size: 18px; }
        .price { font-size: 16px; font-weight: 600; color: #706259; margin: 0 0 15px 0; }
        .order-btn { background-color: #4a3b32; color: #ffffff; border: none; padding: 12px 20px; width: 100%; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .order-btn:hover { background-color: #706259; }
    </style>
</head>
<body>

    <header>
        <h1>HOUDA BOUTIQUE</h1>
        <nav>
            <button class="nav-link active" onclick="switchPage('shop')">Shop Collection</button>
            <button class="nav-link" onclick="switchPage('about')">Our Story</button>
        </nav>
    </header>

    <div id="shop" class="page active">
        <!-- New Search Bar -->
        <input type="text" id="searchBar" placeholder="Search for items..." onkeyup="filterProducts()">
        
        <div class="products-grid" id="productGrid">
            <!-- Items load here -->
        </div>
    </div>

    <div id="about" class="page">
        <h2 style="font-family: Georgia, serif; text-align: center; color: #4a3b32;">Our Story</h2>
        <p style="max-width: 600px; margin: 20px auto; text-align: center; color: #706259; line-height: 1.8;">Curating elegant, timeless styles for everyday confidence.</p>
    </div>

    <!-- Floating Shopping Cart Button -->
    <div id="cart-button" onclick="toggleCart()" style="position: fixed; bottom: 20px; right: 20px; background: #4a3b32; color: #fff; padding: 15px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
      🛒 Cart (<span id="cart-count">0</span>)
    </div>

    <!-- Slide-out Cart Panel -->
    <div id="cart-panel" style="position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: #fff; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.3s; z-index: 1001; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box;">
      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f5ebe0; padding-bottom: 10px;">
        <h2 style="margin:0; font-size: 20px; color: #4a3b32; font-family: Georgia, serif;">Your Cart</h2>
        <button onclick="toggleCart()" style="background: none; border: none; font-size: 24px; cursor: pointer;">&times;</button>
      </div>
      <div id="cart-items" style="flex: 1; overflow-y: auto; margin-top: 20px;"></div>
      <div style="border-top: 2px solid #f5ebe0; padding-top: 15px;">
        <p>Subtotal: $<span id="cart-subtotal">0.00</span></p>
        <p>Delivery: $4.00</p>
        <h3>Total: $<span id="cart-total">0.00</span></h3>
        <button onclick="checkoutWhatsApp()" style="width: 100%; background: #25D366; color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer;">Checkout via WhatsApp 💬</button>
      </div>
    </div>

    <script>
        let cart = [];
        let allProducts = []; // Stores products for filtering
        const WHATSAPP_NUMBER = "96171474769"; 
        const DELIVERY_FEE = 4.00;

        async function loadBoutiqueProducts() {
            const grid = document.getElementById('productGrid');
            try {
                const response = await fetch('/data/clothes.json');
                allProducts = await response.json();
                renderGrid(allProducts);
            } catch (err) {
                grid.innerHTML = `<p style="text-align:center;">Log into <strong>/admin</strong> to publish your first items!</p>`;
            }
        }

        function renderGrid(products) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            products.forEach(product => {
                let imgUrl = product.image || 'https://via.placeholder.com/320x320?text=No+Image';
                grid.innerHTML += `
                    <div class="product-card">
                        <img class="product-img" src="${imgUrl}" alt="${product.name}">
                        <h3>${product.name}</h3>
                        <p class="price">$${product.price}</p>
                        <button class="order-btn" onclick="addToCart('${product.name.replace(/'/g, "\\'")}', '${product.price}', '${imgUrl}')">Add to Cart</button>
                    </div>
                `;
            });
        }

        function filterProducts() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query));
            renderGrid(filtered);
        }

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function toggleCart() {
            const panel = document.getElementById('cart-panel');
            panel.style.right = (panel.style.right === '0px') ? '-400px' : '0px';
            renderCart();
        }

        function addToCart(name, price, image) {
            const existing = cart.find(i => i.name === name);
            if (existing) existing.quantity += 1;
            else cart.push({ name, price: parseFloat(price), image, quantity: 1 });
            document.getElementById('cart-count').innerText = cart.reduce((s, i) => s + i.quantity, 0);
            alert(`${name} added!`);
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            let subtotal = 0;
            cart.forEach((item, index) => {
                subtotal += item.price * item.quantity;
                container.innerHTML += `<div><h4>${item.name}</h4><p>$${item.price} x ${item.quantity}</p></div>`;
            });
            document.getElementById('cart-subtotal').innerText = subtotal.toFixed(2);
            document.getElementById('cart-total').innerText = (subtotal + DELIVERY_FEE).toFixed(2);
        }

        function checkoutWhatsApp() {
            let message = "New Order:\n";
            cart.forEach(i => message += `${i.name} (x${i.quantity}) - $${i.price * i.quantity}\n`);
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message + "\nTotal: $" + (cart.reduce((s,i)=>s+(i.price*i.quantity),0)+DELIVERY_FEE))}`, '_blank');
        }

        loadBoutiqueProducts();
    </script>
</body>
</html>
