<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Houda Boutique</title>
    <!-- Secure Shopify-style login script connection -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #ffffff; color: #3d342e; }
        header { background-color: #f5ebe0; padding: 25px 20px; text-align: center; border-bottom: 1px solid #e3d5ca; position: sticky; top: 0; z-index: 100; }
        h1 { margin: 0 0 15px 0; font-family: Georgia, serif; letter-spacing: 3px; color: #4a3b32; text-transform: uppercase; }
        nav button { background: none; border: none; padding: 10px 20px; margin: 0 5px; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; color: #706259; border-bottom: 2px solid transparent; }
        nav button.active { color: #4a3b32; font-weight: bold; border-bottom: 2px solid #4a3b32; }
        .page { display: none; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .page.active { display: block; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 35px; }
        .product-card { background: #ffffff; border-radius: 4px; padding: 15px; text-align: center; border: 1px solid #f5ebe0; transition: transform 0.3s ease; }
        .product-card:hover { transform: translateY(-4px); }
        .product-img-placeholder { background-color: #fdfbf7; border: 1px solid #f5ebe0; height: 320px; display: flex; align-items: center; justify-content: center; color: #a39489; font-style: italic; font-size: 14px; margin-bottom: 15px; text-transform: capitalize; }
        .product-card h3 { margin: 12px 0 6px 0; color: #4a3b32; font-family: Georgia, serif; font-size: 18px; }
        .price { font-size: 16px; font-weight: 600; color: #706259; margin: 0 0 8px 0; }
        .stock { font-size: 13px; color: #9c8e85; margin-bottom: 15px; text-transform: uppercase; }
        .stock.low { color: #c97a7a; font-weight: bold; }
        .stock.out { color: #ccc; }
        .order-btn { background-color: #4a3b32; color: #ffffff; border: none; padding: 12px 20px; width: 100%; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .order-btn:disabled { background-color: #e3d5ca; color: #bcafaf; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <h1>HOUDA BOUTIQUE</h1>
        <nav>
            <button class="nav-link active" onclick="switchPage('shop')">Shop Collection</button>
            <button class="nav-link" onclick="switchPage('about')">Our Story</button>
        </nav>
    </header>

    <div id="shop" class="page active">
        <div class="products-grid" id="productGrid">
            <!-- Items typed into your dashboard will load here automatically -->
        </div>
    </div>

    <div id="about" class="page">
        <h2 style="font-family: Georgia, serif; text-align: center; color: #4a3b32;">Our Story</h2>
        <p style="max-width: 600px; margin: 20px auto; text-align: center; color: #706259; line-height: 1.8;">Curating elegant, timeless styles for everyday confidence.</p>
    </div>

    <script>
        // Reads your visual inputs straight out of your GitHub database file dynamically
        async function loadBoutiqueProducts() {
            const grid = document.getElementById('productGrid');
            try {
                const response = await fetch('/data/clothes.json');
                const products = await response.json();
                grid.innerHTML = '';
                
                if(!products || products.length === 0) {
                    grid.innerHTML = `<p style="text-align:center;grid-column:1/-1;color:#9c8e85;">Your collection is empty. Go to your /admin link to add items!</p>`;
                    return;
                }

                products.forEach(product => {
                    let stockText = `${product.stock} pieces available`;
                    let stockClass = "stock";
                    let btnDisabled = "";
                    let btnText = "Add to Order";

                    if (parseInt(product.stock) === 0) { 
                        stockText = "Out of Stock"; 
                        stockClass = "stock out"; 
                        btnDisabled = "disabled";
                        btnText = "Sold Out";
                    } else if (parseInt(product.stock) <= 3) { 
                        stockText = `Hurry, only ${product.stock} left`; 
                        stockClass = "stock low"; 
                    }

                    grid.innerHTML += `
                        <div class="product-card">
                            <div class="product-img-placeholder">${product.name}</div>
                            <h3>${product.name}</h3>
                            <p class="price">$${product.price}</p>
                            <p class="${stockClass}">${stockText}</p>
                            <button class="order-btn" ${btnDisabled}>${btnText}</button>
                        </div>
                    `;
                });
            } catch (err) {
                // Fallback instructions if you haven't published anything from your dashboard yet
                grid.innerHTML = `<p style="text-align:center;grid-column:1/-1;color:#9c8e85;">Boutique initialised. Log into your dashboard at <strong>yourlink.netlify.app/admin</strong> to publish your first clothing items!</p>`;
            }
        }

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        loadBoutiqueProducts();

        // Keeps secure login panel synced
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) { window.netlifyIdentity.on("login", () => { document.location.reload(); }); }
            });
        }
    </script>
</body>
</html>
